steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/api/Dockerfile
      - -t
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --region
      - ${_DEPLOY_REGION}
      - --image
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run services describe "${_SERVICE_NAME}" \
          --region "${_DEPLOY_REGION}" \
          --format='value(status.url)' > /workspace/service_url.txt
  - name: curlimages/curl:8.12.1
    entrypoint: sh
    args:
      - -ceu
      - |
        SERVICE_URL="$(cat /workspace/service_url.txt)"
        curl -fsS "${SERVICE_URL}/healthz"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
