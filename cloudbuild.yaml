steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE_TAG="${SHORT_SHA}"
        if [ -z "$${IMAGE_TAG}" ] || [ "$${IMAGE_TAG}" = '$${SHORT_SHA}' ]; then
          IMAGE_TAG="${COMMIT_SHA}"
        fi
        if [ -n "$${IMAGE_TAG}" ] && [ "$${IMAGE_TAG}" != '$${COMMIT_SHA}' ] && [ "$${#IMAGE_TAG}" -gt 7 ]; then
          IMAGE_TAG="$${IMAGE_TAG:0:7}"
        fi
        if [ -z "$${IMAGE_TAG}" ] || [ "$${IMAGE_TAG}" = '$${COMMIT_SHA}' ]; then
          IMAGE_TAG="manual-$$(date +%Y%m%d%H%M%S)"
        fi
        IMAGE_REF="${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_IMAGE_NAME}:$${IMAGE_TAG}"
        echo "$${IMAGE_REF}" > /workspace/image_ref.txt
        docker build -f apps/api/Dockerfile -t "$${IMAGE_REF}" .
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE_REF="$$(cat /workspace/image_ref.txt)"
        docker push "$${IMAGE_REF}"
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE_REF="$$(cat /workspace/image_ref.txt)"
        MIGRATION_JOB="$${_MIGRATION_JOB:-${_SERVICE_NAME}-core-migrate}"
        gcloud run jobs update "$${MIGRATION_JOB}" \
          --region "${_DEPLOY_REGION}" \
          --image "$${IMAGE_REF}"
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        MIGRATION_JOB="$${_MIGRATION_JOB:-${_SERVICE_NAME}-core-migrate}"
        gcloud run jobs execute "$${MIGRATION_JOB}" \
          --region "${_DEPLOY_REGION}" \
          --wait
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        IMAGE_REF="$$(cat /workspace/image_ref.txt)"
        gcloud run services update "${_SERVICE_NAME}" \
          --region "${_DEPLOY_REGION}" \
          --image "$${IMAGE_REF}"
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run services describe "${_SERVICE_NAME}" \
          --region "${_DEPLOY_REGION}" \
          --format='value(status.url)' > /workspace/service_url.txt
  - name: curlimages/curl:8.12.1
    entrypoint: sh
    args:
      - -ceu
      - |
        SERVICE_URL="$(cat /workspace/service_url.txt)"
        echo "Health check URL: $${SERVICE_URL}/health"
        for attempt in 1 2 3 4 5; do
          if curl -fsS "$${SERVICE_URL}/health" >/dev/null; then
            exit 0
          fi
          echo "Health check attempt $${attempt} failed; retrying..."
          sleep 5
        done
        curl -i "$${SERVICE_URL}/health"
        exit 1

options:
  logging: CLOUD_LOGGING_ONLY
