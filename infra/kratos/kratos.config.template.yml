version: v1.1.0

log:
  level: ${LOG_LEVEL}
  format: text
  leak_sensitive_values: false

serve:
  public:
    host: 0.0.0.0
    port: 8080
    base_url: ${KRATOS_PUBLIC_BASE_URL}
    cors:
      enabled: true
      allowed_origins:
        - ${WEB_BASE_URL}
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
      allow_credentials: true
  admin:
    host: 0.0.0.0
    port: 8081
    base_url: ${KRATOS_ADMIN_BASE_URL}

selfservice:
  default_browser_return_url: ${WEB_BASE_URL}/admin
  allowed_return_urls:
    - ${WEB_BASE_URL}
    - ${WEB_BASE_URL}/admin
  methods:
    password:
      enabled: true
    oidc:
      enabled: true
      config:
        providers: ${OIDC_PROVIDER_CONFIG}
  flows:
    login:
      ui_url: ${WEB_BASE_URL}/login
    logout:
      after:
        default_browser_return_url: ${WEB_BASE_URL}/login
    settings:
      ui_url: ${WEB_BASE_URL}/settings
      privileged_session_max_age: 15m
    recovery:
      enabled: true
      ui_url: ${WEB_BASE_URL}/recovery
    verification:
      enabled: true
      ui_url: ${WEB_BASE_URL}/verification
      after:
        default_browser_return_url: ${WEB_BASE_URL}/admin
      use: code

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/kratos/schemas/identity.schema.json

secrets:
  cookie:
    - ${SECRETS_COOKIE}
  default:
    - ${SECRETS_DEFAULT}

session:
  cookie:
    persistent: true
    same_site: Lax
    domain: ${COOKIE_DOMAIN}
    path: /
  whoami:
    required_aal: aal1

courier:
  smtp:
    connection_uri: ${COURIER_SMTP_CONNECTION_URI}
