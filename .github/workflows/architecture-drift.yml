name: architecture-drift

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check architecture drift
        run: node scripts/check-architecture-drift.mjs

      - name: Check pico-app-container version sync
        run: node scripts/check-pico-app-container-version.mjs
